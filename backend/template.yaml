AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CloudyAI Backend
  FastAPI application running on AWS Lambda behind API Gateway.

Parameters:
  OpenAIKey:
    Type: String
    Description: "OpenAI API Key for CloudyAI intelligence"
    NoEcho: true
    Default: ""
  GeminiKey:
    Type: String
    Description: "Google Gemini API Key for CloudyAI intelligence"
    NoEcho: true
    Default: ""

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        AWS_SECRET_NAME: "CloudyAI/Settings"
        DYNAMODB_TABLE: "CloudyAI-History"
        S3_BUCKET: "cloudyai-assets"
        OPENAI_API_KEY: !Ref OpenAIKey
        GEMINI_API_KEY: !Ref GeminiKey


Resources:
  CloudyAIFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Runtime: python3.13
      Architectures:
        - arm64
      Events:
        ProxyApiGreedy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        RootApi:
          Type: Api
          Properties:
            Path: /
            Method: ANY
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:CloudyAI/Settings-*"
        - DynamoDBCrudPolicy:
            TableName: "CloudyAI-History"
        - S3CrudPolicy:
            BucketName: "cloudyai-assets"
        # Add Bedrock policy if needed, SAM might not have a managed policy for Bedrock yet
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
